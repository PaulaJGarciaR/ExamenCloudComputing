name: Destroy Infrastructure

on:
  [cite_start]workflow_dispatch: # Permite la ejecución manual controlada desde la pestaña Actions [cite: 27, 28]

jobs:
  Destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ─────────────────────────────────────────────────────────────────
      # STACK 4 - AUTOMATIZACIÓN Y ESCALABILIDAD (Primero en destruir)
      # ─────────────────────────────────────────────────────────────────
      - name: Destruir Stack 4 - Automatización y Escalabilidad Programada
        run: |
          echo "Iniciando eliminación del Stack 4..."
          aws cloudformation delete-stack --stack-name Automation-Paula-Darwin
          echo "Esperando a que se complete la eliminación de Automation..."
          aws cloudformation wait stack-delete-complete --stack-name Automation-Paula-Darwin
          echo "Stack 4 eliminado correctamente."

      # ─────────────────────────────────────────────────────────────────
      # STACK 3 - ALB, ASG Y WARM POOL (Segundo en destruir)
      # ─────────────────────────────────────────────────────────────────
      - name: Destruir Stack 3 - ALB, ASG y Warm Pool
        run: |
          echo "Iniciando eliminación del Stack 3..."
          aws cloudformation delete-stack --stack-name ALB-ASG-Paula-Darwin
          echo "Esperando a que se complete la eliminación de ALB-ASG..."
          aws cloudformation wait stack-delete-complete --stack-name ALB-ASG-Paula-Darwin
          echo "Stack 3 eliminado correctamente."

      # ─────────────────────────────────────────────────────────────────
      # STACK 2 - EC2 ESTÁTICA (Tercero en destruir)
      # ─────────────────────────────────────────────────────────────────
      - name: Destruir Stack 2 - EC2 Estática
        run: |
          echo "Iniciando eliminación del Stack 2..."
          aws cloudformation delete-stack --stack-name EC2-Paula-Darwin
          echo "Esperando a que se complete la eliminación de EC2 Estática..."
          aws cloudformation wait stack-delete-complete --stack-name EC2-Paula-Darwin
          echo "Stack 2 eliminado correctamente."

      # ─────────────────────────────────────────────────────────────────
      # STACK 1 - SECURITY GROUPS (Último en destruir)
      # ─────────────────────────────────────────────────────────────────
      - name: Destruir Stack 1 - Security Groups
        run: |
          echo "Iniciando eliminación del Stack 1..."
          aws cloudformation delete-stack --stack-name SecurityGroups-Paula-Darwin
          echo "Esperando a que se complete la eliminación de Security Groups..."
          aws cloudformation wait stack-delete-complete --stack-name SecurityGroups-Paula-Darwin
          echo "¡Infraestructura de Paula & Darwin completamente destruida con éxito!"
